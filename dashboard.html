<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overview Dashboard | Orbix Helmet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .glass-card {
      background: white; border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      padding: 1.5rem;
    }
  </style>
</head>
<body class="text-gray-800 font-sans antialiased flex flex-col min-h-screen">
  <!-- Navbar -->
  <header class="bg-indigo-700 shadow-md sticky top-0 z-50 text-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center flex-wrap">
        <div class="flex items-center space-x-3 w-full md:w-auto mb-2 md:mb-0">
          <i class="fa-solid fa-motorcycle text-2xl"></i>
          <span class="font-bold text-xl tracking-wide">Orbix Helmet</span>
        </div>
        <nav class="flex items-center space-x-1 md:space-x-3 text-sm font-medium overflow-x-auto w-full md:w-auto">
          <a href="dashboard.html" class="bg-indigo-800 px-3 py-2 rounded-md transition">Dashboard</a>
          <a href="alerts.html" class="hover:bg-indigo-600 px-3 py-2 rounded-md transition">Alerts</a>
          <a href="sensors.html" class="hover:bg-indigo-600 px-3 py-2 rounded-md transition">Sensors</a>
          <a href="contacts.html" class="hover:bg-indigo-600 px-3 py-2 rounded-md transition">Contacts</a>
          <a href="system.html" class="hover:bg-indigo-600 px-3 py-2 rounded-md transition">System Info</a>
          <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 px-3 py-2 rounded-md transition shadow flex items-center">
            <i class="fa-solid fa-arrow-right-from-bracket mr-1"></i> Logout
          </button>
        </nav>
      </div>
    </div>
  </header>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-800"><i class="fa-solid fa-gauge text-indigo-500 mr-2"></i>Helmet Overview</h1>
      <p class="text-gray-600 mt-2">Real-time status snapshot of the helmet ecosystem.</p>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <!-- Rider Status -->
      <div class="glass-card flex flex-col justify-center items-center border-t-4 border-green-500 py-10" id="cardRiderStatus">
        <div class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center text-green-500 text-4xl mb-4" id="iconRiderStatus">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h2 class="text-gray-500 font-semibold uppercase tracking-wider mb-2">Rider Status</h2>
        <p class="text-4xl font-bold text-green-600" id="riderStatusText">Safe</p>
      </div>

      <!-- General Grid -->
      <div class="grid grid-cols-1 gap-4">
        <!-- Helmet Connection -->
        <div class="glass-card flex items-center justify-between border-l-4 border-blue-500 bg-white" id="cardConnStatus">
          <div>
            <p class="text-sm text-gray-400 font-semibold uppercase tracking-wider">Helmet Connection</p>
            <h2 class="text-2xl font-bold text-blue-600 mt-1" id="connStatusText">Checking...</h2>
          </div>
          <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-500 text-xl">
            <i class="fa-solid fa-wifi"></i>
          </div>
        </div>

        <!-- Last Updated -->
        <div class="glass-card flex items-center justify-between border-l-4 border-yellow-500 bg-white">
          <div>
            <p class="text-sm text-gray-400 font-semibold uppercase tracking-wider">Last Sync Timestamp</p>
            <h2 class="text-xl font-bold text-gray-700 mt-1" id="lastUpdatedText">--:--:--</h2>
          </div>
          <div class="w-12 h-12 rounded-full bg-yellow-100 flex items-center justify-center text-yellow-500 text-xl">
            <i class="fa-regular fa-clock"></i>
          </div>
        </div>

        <!-- GPS Location -->
        <div class="glass-card flex items-center justify-between border-l-4 border-purple-500 bg-white">
          <div>
            <p class="text-sm text-gray-400 font-semibold uppercase tracking-wider">GPS Location (Simulated)</p>
            <h2 class="text-lg font-bold text-gray-700 mt-1" id="gpsCoords">28.6139° N, 77.2090° E</h2>
            <a href="https://www.google.com/maps/search/?api=1&query=28.6139,77.2090" target="_blank" class="text-sm text-indigo-600 font-medium hover:underline mt-1 block">
              <i class="fa-solid fa-location-dot mr-1"></i> Open in Maps
            </a>
          </div>
          <div class="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center text-purple-500 text-xl">
            <i class="fa-solid fa-map-location-dot"></i>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
